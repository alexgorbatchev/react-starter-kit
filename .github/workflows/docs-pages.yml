name: Docs Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/docs-pages.yml"
  workflow_dispatch:

env:
  HUSKY: 0

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  publish:
    name: Publish Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Set docs GitHub Pages URL
        run: |
          repo="${GITHUB_REPOSITORY#*/}"
          owner="${GITHUB_REPOSITORY%/*}"

          if [ "$repo" = "${owner}.github.io" ]; then
            echo "DOCS_BASE=/" >> "$GITHUB_ENV"
            echo "DOCS_SITE_URL=https://${owner}.github.io/" >> "$GITHUB_ENV"
          else
            echo "DOCS_BASE=/${repo}/" >> "$GITHUB_ENV"
            echo "DOCS_SITE_URL=https://${owner}.github.io/${repo}/" >> "$GITHUB_ENV"
          fi

          echo "DOCS_CLEAN_URLS=false" >> "$GITHUB_ENV"
      - run: bun run docs:build
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/.vitepress/dist
          enable_jekyll: false
